<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cloudflare.com">
        <link rel="stylesheet" href="style.css">
        
        <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/128/325/325686.png">
        
        <title>Contact Me | My Portfolio</title>
    </head>
    
<body>
    <header>
        <a href="index.html" class="logo">Contact Me !</a>
        
        <nav id="navbar">
            <a href="index.html">Home</a>
            <a href="education.html" target="_blank" rel="noopener noreferrer">Education</a>
            <a href="aboutme.html" target="_blank" rel="noopener noreferrer">About Me</a>
            <!-- The active class highlights this tab in purple -->
            <a href="contact.html" class="active">Contact</a>
            <a href="experience.html" target="_blank" rel="noopener noreferrer">Experience</a>
        </nav>

        <!-- Mobile hamburger menu icon -->
        <i class="fa-solid fa-bars" id="menu-icon"></i>
    </header>

    <!-- Interactive Contact Form Section -->
    <section class="contact-section">
        <div class="contact-container">
            <h2 class="heading">Contact <span>Me</span></h2>
            
            <form action="#" class="contact-form">
                <div class="input-box">
                    <input type="text" placeholder="Full Name" required>
                    <input type="email" placeholder="Email Address" required>
                </div>
                <div class="input-box">
                    <input type="number" placeholder="Mobile Number">
                    <input type="text" placeholder="Email Subject">
                </div>
                <textarea cols="30" rows="10" placeholder="Your Message" required></textarea>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </div>
    </section>

    <!-- JavaScript script to run the mobile menu actions -->
    <script>
        let menuIcon = document.querySelector('#menu-icon');
        let navbar = document.querySelector('#navbar');

        menuIcon.onclick = () => {
            menuIcon.classList.toggle('fa-xmark'); // Switches hamburger icon to an 'X'
            navbar.classList.toggle('active');     // Drops down or rolls up the menu items
        }
    </script>
</body>
</html>
